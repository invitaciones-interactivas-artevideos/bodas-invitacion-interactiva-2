<style>
/* ── VARIABLES DINÁMICAS ── */
:root {
  --bg-1: #FFFFFF;
  --bg-2: #F4E3E3;
  --accent: #C78D8D; 
  --title-color: #7A4E4E;
  --text-color: #5A4A4A;
  
  --font-portada: 'Cormorant Garamond', serif;
  --font-titulo: 'Cormorant Garamond', serif;
  --font-cuerpo: 'Jost', sans-serif;
  
  --size-portada-titulo: 4.5rem;
  --size-portada-sub: 1rem;
  --size-titulo-seccion: 3rem;
  --size-cuerpo: 1.5rem;
  
  --color-portada-titulo: #ffffff;
  --color-portada-sub: #ffffff;

  --espacio-titulo-texto: 2rem;
  --espacio-texto-boton: 1.5rem;
  --pos-pc-vertical: 50%;
  --pos-movil-vertical: 50%;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); 
    color: var(--text-color); 
    font-family: var(--font-cuerpo); 
    font-size: var(--size-cuerpo);
    line-height: 1.6; 
    text-align: center;
    overflow-x: hidden;
}

/* ── ORNAMENTOS LATERALES (FLORALES / HOJAS) ── */
.ornamento {
    position: fixed; width: 120px; height: 100vh; z-index: 1000;
    pointer-events: none; opacity: 0.2; display: none;
    color: var(--title-color); /* Adopta el color del título automáticamente */
}
.ornamento-izq { left: 0; top: 0; }
.ornamento-der { right: 0; top: 0; transform: scaleX(-1); } /* Voltea el mismo diseño para la derecha */

@media (max-width: 768px) {
    .ornamento { width: 45px; opacity: 0.15; }
}

/* ── PORTADA ── */
#cover {
    position: relative; height: 100vh; display: flex; 
    align-items: center; justify-content: center; overflow: hidden;
    background-color: var(--bg-1);
}
#cover-bg { 
    position: absolute; inset: 0; background-size: cover;
    background-repeat: no-repeat; background-position: center var(--pos-movil-vertical);
}
#cover-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: none;
}
@media (min-width: 768px) {
    #cover-bg { background-position: center var(--pos-pc-vertical) !important; }
}
#cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
#cover-content { position: relative; z-index: 2; padding: 20px; }

#cover h1 { 
    font-family: var(--font-portada); font-size: var(--size-portada-titulo); 
    color: var(--color-portada-titulo); font-weight: 300; 
    letter-spacing: 2px; line-height: 1.2;
}
#t-eyebrow, #t-cover-date {
    font-family: var(--font-portada); color: var(--color-portada-sub);
}

/* ── ANIMACIONES & BOTONES ── */
.icon-container {
    width: 45px; margin: 0 auto; color: var(--accent);
    margin-bottom: var(--espacio-titulo-texto);
    animation: floating 3s ease-in-out infinite;
}
@keyframes floating {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
}
.scroll-arrow {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 30px; color: white; z-index: 10; animation: bounce 2s infinite;
}
@keyframes bounce { 
    0%, 100% { transform: translate(-50%, 0); opacity: 0.3; } 
    50% { transform: translate(-50%, 15px); opacity: 1; } 
}

.btn {
    display: inline-block; padding: 1rem 2.2rem; margin-top: var(--espacio-texto-boton);
    background: var(--accent); color: #ffffff !important; font-size: 0.8rem !important;
    font-family: var(--font-cuerpo); font-weight: 600; text-transform: uppercase;
    letter-spacing: 3px; text-decoration: none; cursor: pointer; border: none;
    border-radius: 4px; transition: all 0.3s ease;
}
.btn:hover { transform: translateY(-2px); background: var(--title-color); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

/* ── SECCIONES ── */
section { padding: 6rem 1.5rem; opacity: 0; transform: translateY(20px); transition: 1s all ease; position: relative; z-index: 5; }
section.visible { opacity: 1; transform: translateY(0); }
section:nth-of-type(odd) { background-color: var(--bg-1) !important; }
section:nth-of-type(even) { background-color: var(--bg-2) !important; }

h2 { 
    font-family: var(--font-titulo); font-size: var(--size-titulo-seccion); 
    font-weight: 300; letter-spacing: 2px; text-transform: uppercase;
    color: var(--title-color); margin-bottom: var(--espacio-titulo-texto);
}
h3 { font-family: var(--font-titulo); font-size: calc(var(--size-titulo-seccion) * 0.7); color: var(--title-color); margin-bottom: 0.5rem; font-weight: 400; }
p { font-family: var(--font-cuerpo); font-size: var(--size-cuerpo); color: var(--text-color); }

/* ── OTROS ELEMENTOS ── */
.countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 450px; margin: 2rem auto; }
.cd-item { background: white; padding: 18px 5px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
.cd-num { display: block; font-family: var(--font-titulo); font-size: 2rem; color: var(--accent); font-weight: bold; }
.cd-lab { font-size: 0.65rem; font-family: var(--font-cuerpo); text-transform: uppercase; letter-spacing: 1px; color: var(--text-color); }

.gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 2rem; }
.gallery-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }
.gallery-item:hover img { transform: scale(1.05); }

/* ── MODALES & EXTRAS ── */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
.modal-content { background: rgba(255,255,255,0.95); border-radius: 20px; width: 100%; max-width: 380px; padding: 2.5rem 1.5rem; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
.close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: #888; cursor: pointer; }

#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 30px; border-radius: 50px; font-size: 0.85rem; z-index: 7000; display: none; }
#music-btn { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.15); z-index: 5000; cursor: pointer; color: var(--accent); transition: transform 0.3s; }
#music-btn:hover { transform: scale(1.1); }

#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 6000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 85%; border-radius: 6px; }
#lightbox .close-btn { color: white; top: 20px; right: 25px; font-size: 2.5rem; }

@media (min-width: 768px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
